# 监控规则 - 由 monitor.py 加载
rules:
  # === 持仓加仓规则 ===
  - name: "消费ETF加仓-阶梯1"
    code: "515650"
    condition: { field: "price", op: "<=", value: 0.95 }
    action: "add"
    shares: 7000
    max_trigger_per_day: 1
    cooldown_min: 60
    active: true
    note: "跌穿0.95, 加7000股, 计划区间0.93-0.95"

  - name: "消费ETF加仓-阶梯2"
    code: "515650"
    condition: { field: "price", op: "<=", value: 0.93 }
    action: "add"
    shares: 3000
    max_trigger_per_day: 1
    cooldown_min: 60
    active: true
    note: "跌穿0.93, 再加3000股"

  - name: "恒瑞医药加仓"
    code: "600276"
    condition: { field: "price", op: "between", value: [47, 48] }
    action: "add"
    shares: 100
    max_trigger_per_day: 1
    cooldown_min: 120
    active: true
    note: "回踩47-48区间, 加100股"

  - name: "通信ETF试仓-周一14:30后"
    code: "515880"
    condition: { field: "price", op: "<=", value: 1.70 }
    action: "add"
    shares: 3000
    max_trigger_per_day: 1
    cooldown_min: 240
    active: false
    note: "已停用2026-07-01: 通信板块资金流-224亿退潮, 1.70是破位非回踩. 固定价买点在退潮市场是陷阱. 需配合行业资金流+板块趋势重启."
    extra: { weekday_min: 0, time_after: "14:30" }

  - name: "通信ETF加码-下探1.60"
    code: "515880"
    condition: { field: "price", op: "<=", value: 1.60 }
    action: "add"
    shares: 2000
    max_trigger_per_day: 1
    cooldown_min: 240
    active: false
    note: "已停用2026-07-01: 同上, 退潮市场不加码."

  # === 风控规则 ===
  - name: "单标的日内-7%紧急"
    condition: { field: "change_pct", op: "<=", value: -7 }
    action: "info"
    max_trigger_per_day: 3
    cooldown_min: 30
    active: true
    note: "任意持仓日内-7%, 立即检查"
    applies_to: "all_holdings"

  - name: "组合日内-3%警告"
    condition: { field: "portfolio_change_pct", op: "<=", value: -3 }
    action: "info"
    max_trigger_per_day: 2
    cooldown_min: 60
    active: true
    note: "组合整体日内跌超3%"

  # === 持仓获利规则 ===
  - name: "创业板ETF结构止损-破前日低"
    code: "159915"
    condition: { field: "price", op: "<=", value: 4.04 }
    action: "reduce"
    shares: 500
    max_trigger_per_day: 1
    cooldown_min: 0
    active: true
    note: "ATR结构止损(入场4.215-2*ATR0.148≈4.04), 留底仓500, 避免浅止损被洗"
    extra: { time_after: "14:00" }

  - name: "ETF浅止损护栏-勿日内低点卖"
    condition: { field: "change_pct", op: "<=", value: -2 }
    action: "info"
    max_trigger_per_day: 2
    cooldown_min: 30
    active: true
    note: "ETF跌2%仅日内噪音, 未破前日低/MA20勿浅止损卖低点 (06-29教训)"
    applies_to: "all_holdings"
    extra: { time_before: "10:00" }

  - name: "早盘急杀冷静-勿恐慌卖"
    condition: { field: "change_pct", op: "<=", value: -3 }
    action: "info"
    max_trigger_per_day: 1
    cooldown_min: 60
    active: true
    note: "早盘急杀大概率V回, 等14:00后判结构位, 不在低点砍 (06-29教训)"
    applies_to: "all_holdings"
    extra: { time_after: "09:30", time_before: "10:30" }

  - name: "恒瑞止盈-破55"
    code: "600276"
    condition: { field: "price", op: ">=", value: 55.0 }
    action: "info"
    max_trigger_per_day: 1
    cooldown_min: 0
    active: true
    note: "中线目标55, 触发考虑减仓"

  - name: "恒瑞止损-破53(MA20锁利)"
    code: "600276"
    condition: { field: "price", op: "<=", value: 53.0 }
    action: "reduce"
    shares: 100
    max_trigger_per_day: 1
    cooldown_min: 0
    active: true
    note: "破MA20+前低, 反转失败, 全减200股离场"

  - name: "半导体材料设备ETF-回踩关注"
    code: "159516"
    condition: { field: "price", op: "<=", value: 1.85 }
    action: "info"
    max_trigger_per_day: 1
    cooldown_min: 240
    active: true
    note: "回踩1.85关注试仓, 纯卡脖子材料+装备链, 近20日+52%抗跌"

  # === 2026-07-02 新仓 (体系首战 + ETF accumulation) ===
  - name: "聚飞光电止损-破9.28(5% breakout失败)"
    code: "300303"
    condition: { field: "price", op: "<=", value: 9.28 }
    action: "reduce"
    shares: 400
    max_trigger_per_day: 1
    cooldown_min: 0
    active: true
    note: "sys1+Wyckoff吸筹breakout入场9.77, 5%甜区止损9.28(实证铁律), 破则全减400股"

  - name: "聚飞光电止盈-到10.74(1.99R)"
    code: "300303"
    condition: { field: "price", op: ">=", value: 10.74 }
    action: "info"
    max_trigger_per_day: 1
    cooldown_min: 0
    active: true
    note: "setup赔率1.99, 目标10.74(+10%), 到位考虑减半锁利留底仓"

  - name: "半导体设备ETF止损-破1.30"
    code: "560780"
    condition: { field: "price", op: "<=", value: 1.30 }
    action: "reduce"
    shares: 800
    max_trigger_per_day: 1
    cooldown_min: 0
    active: true
    note: "4lot均成本1.365, 破1.30(全lot下方~4.8%)结构失败全减800. ETF勿日内浅止损(06-29教训), 破位再动"
